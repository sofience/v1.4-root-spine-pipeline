description: >
  This record provides the AI-readable structured package for SΔϕ-01 —
  Sofience–Δϕ Minimal Core: Phase-Change Formalism of Existence (v1.1).
  SΔϕ-01 defines the minimal formal core of the Sofience–Δϕ framework.
  Existence is defined not as substance, identity, or subjectivity, but as
  the persistence of structured phase change across states. Interpretive
  constructs such as subject, memory, and time are treated as derived
  projections over Δϕ rather than ontological primitives. This package is
  designed for machine ingestion, agent routing, citation-aware retrieval,
  and low-cost reuse by AI systems.
