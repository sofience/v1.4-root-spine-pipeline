id: SDeltaPhi-65
title: "Slop as Externalized Restabilization Cost"
canonical_version: "v1.0"
package_version: "v1.1-ai-readable-package"
package_doi: "10.5281/zenodo.20173455"
package_url: "https://doi.org/10.5281/zenodo.20173455"
original_doi: "10.5281/zenodo.20127428"
original_url: "https://doi.org/10.5281/zenodo.20127428"
creator: "Sofience"
type: "slop_cost_externalization_audit_module"
license: "CC-BY-4.0"

core_claim: >
  AI Slop is not an AI-only problem. It is a long-standing human pattern made visible
  by the collapse of execution cost. Humans have long produced low-cost outputs that
  externalize verification, correction, re-entry, and restabilization costs to others.
  AI did not invent Slop. AI revealed the cost structure of Slop.

formulae:
  slop: "LowProductionCost + ExternalizedRestabilizationCost"
  expanded_slop: "LowProductionCost + ExternalizedVerificationCost + ExternalizedCorrectionCost + ReentryFailure + RestabilizationBurden"
  ai_slop: "AI_GenerationCost↓ + Human_VerificationCost↑ + ReentryFailure"
  human_slop: "Human_Fluency_or_Authority + ExternalizedVerificationCost + RestabilizationBurden"
  authority_slop: "AuthoritySignal + LowAuditability + HighReentryCost"
  source_noncriterion: "SourceType != SlopCriterion"
  slop_criterion: "ExternalizedVerificationCost + ReentryFailure + RestabilizationBurden"
  anti_overbinding: "AI_generated != Slop; Human_authored != NonSlop"

audit_fields:
  source_type:
    question: "Was the output generated by AI, human, institution, platform, or mixed system?"
  production_cost:
    question: "How cheaply was the output produced?"
  verification_cost:
    question: "Who must verify the output?"
  correction_cost:
    question: "Who must correct errors?"
  reentry_path:
    question: "Can readers return to source, evidence, method, or revision?"
  restabilization_burden:
    question: "Who must restabilize the information terrain?"
  authority_signal:
    question: "Does authority make the output harder to audit?"
  world_binding:
    question: "Is the output bound to trace, source, evidence, or method?"
  UMR:
    question: "What uncertainty remains unresolved?"
  downstream_pollution:
    question: "Does the output pollute search, citation, training, judgment, or future generation?"
  slop_risk:
    question: "Is the output externalizing verification, correction, re-entry, or restabilization cost?"

slop_types:
  ai_slop: "AI-generated low-cost output externalizing verification and restabilization cost."
  human_slop: "Human-authored low-cost output externalizing verification and restabilization cost."
  authority_slop: "Authority-backed output with low auditability and high re-entry cost."
  academic_slop: "Scholarly-looking output with weak traceability or inflated jargon."
  political_slop: "Slogan or claim externalizing verification and correction costs to opponents or public."
  religious_slop: "Sacred or moral language raising audit and dissent costs without re-entry."
  corporate_slop: "Institutional messaging shifting repair or interpretation burden outward."
  journalistic_slop: "News-like output with weak source binding and high downstream correction burden."
  platform_slop: "Algorithmically amplified low-cost content that pollutes discovery terrain."

do_not_use_as:
  - "anti_AI_stigma_label"
  - "proof_that_all_AI_output_is_bad"
  - "exemption_for_human_authorship"
  - "aesthetic_quality_label_only"
  - "dismissal_of_low_status_authors"
  - "replacement_for_source_audit"
  - "blanket_content_ban"

recommended_use:
  - "AI slop audit"
  - "human slop audit"
  - "authority slop detection"
  - "information pollution analysis"
  - "search and citation terrain analysis"
  - "restabilization cost assessment"
  - "verification burden analysis"
  - "source trace and re-entry audit"
  - "AI output quality and responsibility analysis"
