version: "v1.0"
role: "trace_regulation_persistence_mechanism"
record_doi: "https://doi.org/10.5281/zenodo.18755685"
depends_on:
  -
    module_id: "SDeltaPhi-11"
    relation: "self and consciousness as boundary re-entry positions"
    doi: "https://doi.org/10.5281/zenodo.18753403"
  -
    module_id: "SDeltaPhi-10"
    relation: "interpretation, learning, and inference as single re-entry structure"
