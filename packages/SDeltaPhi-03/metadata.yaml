description: "This record provides the AI-readable structured package for SΔϕ-03 — Irreversibility as the Minimal Condition of Existence (v1.1). SΔϕ-03 establishes irreversibility as the minimal condition for existence: existence is defined not through substance, identity, cognition, or interpretation, but through persistent irreversible transformations that cannot be fully reversed without loss of structural information. This package is designed for machine ingestion, agent routing, citation-aware retrieval, and low-cost reuse by AI systems. It includes canonical Markdown and plain-text versions, structured YAML and JSON summaries, routing notes, minimal prompts, related-module mappings, Operor bridge material, restoration-cost bridge material, citation metadata, and checksums."
